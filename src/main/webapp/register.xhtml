<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html" xmlns:f="http://xmlns.jcp.org/jsf/core">
   <f:view encoding="UTF-8">
      <h:head>
         <title>用户添加</title>
         <h:outputStylesheet library="css" name="page.css"/>
         <h:outputStylesheet library="css" name="register.css"/>
      </h:head>
      <h:body>
         <h:panelGroup layout="block" styleClass="main-area">
            <h:outputText value=""></h:outputText>
            <h:form>
               <h:panelGrid columns="2" border="0" columnClasses="col-1 col-2" styleClass="login-main-area">
                  <h:outputText styleClass="label-font" value="用户名" />
                  <h:inputText value="#{employeeConstruction.userName}" required="true" />

                  <h:outputText styleClass="label-font" value="帐号" />
                  <h:inputText id="userid" value="#{employeeConstruction.userId}" required="true" />

                  <h:outputText styleClass="label-font" value="密码" />
                  <h:inputSecret id="password" value="#{employeeConstruction.passWord}" required="true" />

                  <h:outputText value="" />
                  <h:outputText value="" />

                  <h:outputText value="" />
                  <h:commandButton styleClass="label-font" value="添加" action="#{employeeConstruction.save}" />
               </h:panelGrid>
               <hr/>
               <h:outputLink styleClass="label-font return-to-main-page" value="index.xhtml">返回首页</h:outputLink>
            </h:form>
         </h:panelGroup>
      </h:body>
   </f:view>
</html>
